        );

        const App = () => {
            const [mode, setMode] = useState('landing');
            const [words, setWords] = useState([]);
            const [audioCache, setAudioCache] = useState({});
            const [currentTheme, setCurrentTheme] = useState('boy');
            const [stickers, setStickers] = useState([]);
            const [stats, setStats] = useState({ correct: 0, incorrect: 0, categories: {} });
            const [settings, setSettings] = useState({ autoPlayAudio: true, flashcardFront: 'english' });
            const [updateAvailable, setUpdateAvailable] = useState(null);
            const [updateLoading, setUpdateLoading] = useState(false);
            const [localVersion, setLocalVersion] = useState('none');

            useEffect(() => {
                const savedTheme = localStorage.getItem('littleLinguistTheme');
                if (savedTheme && THEMES[savedTheme]) setCurrentTheme(savedTheme);

                const savedWords = localStorage.getItem('littleLinguistWords_v3');
                if (savedWords) setWords(JSON.parse(savedWords));
                else { setWords(INITIAL_DATA); localStorage.setItem('littleLinguistWords_v3', JSON.stringify(INITIAL_DATA)); }

                const savedStickers = localStorage.getItem('ll_stickers');
                if(savedStickers) setStickers(JSON.parse(savedStickers));

                const savedStats = localStorage.getItem('ll_stats');
                if(savedStats) setStats(JSON.parse(savedStats));

                const savedSettings = localStorage.getItem('ll_settings');
                if(savedSettings) {
                    setSettings({ autoPlayAudio: true, flashcardFront: 'english', ...JSON.parse(savedSettings) });
                }

                // Check for remote update on every launch using tiny version.json only
                const storedVersion = localStorage.getItem('ll_words_version');
                const localVer = storedVersion || '0.0.0';
                setLocalVersion(storedVersion || 'none');
                fetch(REMOTE_VERSION_URL + '?t=' + Date.now())
                    .then(r => r.json())
                    .then(remote => {
                        if (remote.version && isNewer(localVer, remote.version)) {
                            setUpdateAvailable(remote.version); // just store the version string, not the full data
                        }
                    })
                    .catch(() => {});
            }, []);

            const applyUpdate = async () => {
                if (!updateAvailable) return;
                setUpdateLoading(true);
                try {
                    const res = await fetch(REMOTE_WORDS_URL + '?t=' + Date.now());
                    const data = await res.json();

                    // Always update words (text only, tiny)
                    if (data.words) {
                        setWords(data.words);
                        localStorage.setItem('littleLinguistWords_v3', JSON.stringify(data.words));
                    }

                    if (data.audio) {
                        // Load stored hashes to compare against
                        const storedHashes = JSON.parse(localStorage.getItem('ll_audio_hashes') || '{}');
                        const newHashes = { ...storedHashes };
                        const toWrite = {};
                        let unchanged = 0;

                        for (const [key, entry] of Object.entries(data.audio)) {
                            const remoteHash = entry.hash;
                            if (remoteHash && storedHashes[key] === remoteHash) {
                                unchanged++;
                                continue; // skip — nothing changed
                            }
                            toWrite[key] = entry;
                            newHashes[key] = remoteHash || '';
                        }

                        console.log('Audio: ' + Object.keys(toWrite).length + ' new/changed, ' + unchanged + ' skipped');

                        if (Object.keys(toWrite).length > 0) {
                            await batchSaveAudio(toWrite);
                            // Refresh audio cache for updated keys only
                            const newCache = { ...audioCache };
                            for (const key of Object.keys(toWrite)) {
                                const blob = await getAudioBlob(key);
                                if (blob) newCache[key] = URL.createObjectURL(blob);
                            }
                            setAudioCache(newCache);
                        }

                        localStorage.setItem('ll_audio_hashes', JSON.stringify(newHashes));
                    }

                    localStorage.setItem('ll_words_version', updateAvailable);
                    setLocalVersion(updateAvailable);
                    setUpdateAvailable(null);
                } catch(e) { alert('Update failed: ' + e.message); }
                setUpdateLoading(false);
            };

            useEffect(() => { if(words.length) localStorage.setItem('littleLinguistWords_v3', JSON.stringify(words)); }, [words]);
            useEffect(() => localStorage.setItem('littleLinguistTheme', currentTheme), [currentTheme]);
            useEffect(() => localStorage.setItem('ll_stickers', JSON.stringify(stickers)), [stickers]);
            useEffect(() => localStorage.setItem('ll_stats', JSON.stringify(stats)), [stats]);
            useEffect(() => localStorage.setItem('ll_settings', JSON.stringify(settings)), [settings]);

            const changeTheme = (themeId) => setCurrentTheme(themeId);
            const theme = THEMES[currentTheme];

            const handleAudioPlay = async (wordId, lang) => {
                const audioKey = `${wordId}_${lang}`;
                if (audioCache[audioKey]) {
                    new Audio(audioCache[audioKey]).play().catch(e => console.log(e));
                    return;
                }
                try {
                    const blob = await getAudioBlob(audioKey);
                    if (blob) {
                        const url = URL.createObjectURL(blob);
                        setAudioCache(prev => ({ ...prev, [audioKey]: url }));
                        new Audio(url).play().catch(e => console.log(e));
                    } else if ('speechSynthesis' in window && lang === 'english') {
                         // Fallback for English
                         const u = new SpeechSynthesisUtterance(words.find(w=>w.id===wordId)?.english || "");
                         window.speechSynthesis.speak(u);
                    }
                } catch (e) { console.error(e); }
            };

            const clearAudioCache = (wordId, lang) => {
                const audioKey = `${wordId}_${lang}`;
                setAudioCache(prev => {
                    const newState = { ...prev };
                    delete newState[audioKey];
                    return newState;
                });
            };

            const updateStats = (isCorrect, category) => {
                setStats(prev => {
                    const newStats = { ...prev };
                    if(isCorrect) {
                        newStats.correct++;
                        newStats.categories[category] = (newStats.categories[category] || 0) + 1;
                    } else { newStats.incorrect++; }
                    return newStats;
                });
            };

            return (
                <div className="min-h-screen relative font-sans text-gray-800">
                    <Background theme={theme} />
                    <div className={`${theme.primary} text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center transition-colors duration-500`}>
                        <div className="flex flex-col leading-tight">
                            <span className="font-bold text-xl">🌍 Little Linguist</span>
                            <span className="text-white/60 text-[10px] font-medium tracking-wide">v1.7.0</span>
                        </div>
                        {mode !== 'landing' && (
                             <button onClick={() => setMode('landing')} className="px-4 py-2 bg-white/20 hover:bg-white/30 rounded-full text-sm font-bold flex items-center gap-2 transition-all">
                               <Icon name="Home" size={16} /> Home
                             </button>
                        )}
                    </div>
                    {updateAvailable && (
                        <div className="relative z-50 bg-yellow-400 text-yellow-900 px-4 py-3 flex items-center justify-between gap-3 shadow-md">
                            <span className="font-bold text-sm">📦 New word pack available (v{updateAvailable})</span>
                            <button
                                onClick={applyUpdate}
                                disabled={updateLoading}
                                className="bg-yellow-900 text-yellow-100 px-4 py-1.5 rounded-full font-bold text-xs hover:bg-yellow-800 transition-colors shrink-0"
                            >
                                {updateLoading ? 'Downloading...' : 'Update Now'}
                            </button>
                        </div>
                    )}
                    <div className="relative z-10 pb-20">
                        {mode === 'landing' && <Landing setMode={setMode} theme={theme} changeTheme={changeTheme} currentTheme={currentTheme} stickers={stickers} />}
                        {mode === 'parent' && <ParentManager words={words} setWords={setWords} playAudio={handleAudioPlay} clearCache={clearAudioCache} theme={theme} currentTheme={currentTheme} changeTheme={changeTheme} stats={stats} settings={settings} setSettings={setSettings} localVersion={localVersion} setLocalVersion={setLocalVersion} />}
                        {mode === 'kid_dashboard' && <KidZone words={words} audioCache={audioCache} playAudio={handleAudioPlay} setMode={setMode} theme={theme} stickers={stickers} setStickers={setStickers} stats={stats} updateStats={updateStats} settings={settings} />}
                    </div>
                </div>
            );
        };

        const Landing = ({ setMode, theme, changeTheme, currentTheme, stickers }) => {
            const [challenge, setChallenge] = useState(null);
            const [answer, setAnswer] = useState('');
            const [installPrompt, setInstallPrompt] = useState(null);
            const [installed, setInstalled] = useState(false);

            useEffect(() => {
                const handler = (e) => { e.preventDefault(); setInstallPrompt(e); };
                window.addEventListener('beforeinstallprompt', handler);
                window.addEventListener('appinstalled', () => setInstalled(true));
                return () => window.removeEventListener('beforeinstallprompt', handler);
            }, []);

            const handleInstall = async () => {
                if (!installPrompt) return;
                installPrompt.prompt();
                const { outcome } = await installPrompt.userChoice;
                if (outcome === 'accepted') setInstalled(true);
                setInstallPrompt(null);
            };
            const startChallenge = () => {
                const n1 = Math.floor(Math.random() * 5) + 1;
                const n2 = Math.floor(Math.random() * 4) + 1;
                setChallenge({ q: `${n1} + ${n2}`, a: (n1 + n2).toString() });
                setAnswer('');
            };
            const verify = () => {
                if (answer.trim() === challenge.a) { setChallenge(null); setMode('parent'); } 
                else { alert("Oops! Try again."); setAnswer(''); }
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-[80vh] p-4 gap-8 relative">
                    {challenge && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-white/60 backdrop-blur-sm rounded-3xl animate-pop">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl border-4 border-gray-100 w-full max-w-xs text-center">
                                <div className="text-4xl mb-4">🔒</div>
                                <h3 className="text-xl font-bold text-gray-800 mb-2">Parents Only</h3>
                                <p className="text-gray-500 mb-6 font-medium">What is {challenge.q}?</p>
                                <input 
                                    type="number" 
                                    value={answer} 
                                    onChange={e => setAnswer(e.target.value)} 
                                    onKeyDown={(e) => { if (e.key === 'Enter') verify(); }}
                                    className="w-full bg-gray-50 border-2 border-gray-200 rounded-xl p-4 text-center text-2xl font-bold mb-4 focus:border-blue-400 focus:outline-none" 
                                    placeholder="?" 
                                    autoFocus 
                                />
                                <div className="flex gap-3">
                                    <button onClick={() => setChallenge(null)} className="flex-1 py-3 rounded-xl font-bold text-gray-500 hover:bg-gray-100 transition-colors">Cancel</button>
                                    <button onClick={verify} className="flex-1 bg-blue-600 py-3 rounded-xl font-bold text-white hover:bg-blue-700 shadow-lg shadow-blue-200 transition-colors">Enter</button>
                                </div>
                            </div>
                        </div>
                    )}
                    <div className="text-center animate-pop">
                        <h1 className={`text-5xl md:text-7xl font-extrabold ${theme.accentText} mb-4 drop-shadow-sm`}>Hello! 👋</h1>
                        <p className="text-xl text-gray-600 font-medium">Let's learn Yoruba & Gungbe!</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
                        <button onClick={() => setMode('kid_dashboard')} className={`group relative overflow-hidden bg-white p-8 rounded-3xl shadow-xl hover:shadow-2xl hover:scale-105 transition-all transform border-b-8 ${theme.cardBorder}`}>
                            <div className={`absolute top-0 right-0 w-24 h-24 rounded-bl-full opacity-20 ${theme.primary}`}></div>
                            
                            {/* Theme Toggles inside the card */}
                            <div className="absolute top-4 right-4 z-10 flex gap-2" onClick={(e) => e.stopPropagation()}>
                                <button onClick={() => changeTheme('boy')} className={`w-8 h-8 rounded-full flex items-center justify-center border-2 transition-all ${currentTheme === 'boy' ? 'border-blue-500 bg-blue-100 scale-110' : 'border-gray-200 bg-white hover:scale-110 opacity-60'}`} title="Adventure Explorer">👦</button>
                                <button onClick={() => changeTheme('girl')} className={`w-8 h-8 rounded-full flex items-center justify-center border-2 transition-all ${currentTheme === 'girl' ? 'border-pink-500 bg-pink-100 scale-110' : 'border-gray-200 bg-white hover:scale-110 opacity-60'}`} title="Magical World">👧</button>
                            </div>

                            <div className="flex flex-col items-center">
                                <div className="mb-4 text-7xl">
                                    <Icon name={theme.kidIcon} size={96} className={theme.accentText} />
                                </div>
                                <span className={`text-3xl font-bold ${theme.accentText}`}>I'm a Kid</span>
                                <span className="text-sm text-gray-400 mt-2 font-bold uppercase tracking-wider">Play & Learn</span>
                                
                                {/* Progress Badge */}
                                {stickers.length > 0 && (
                                    <div className="mt-4 bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-bold border border-yellow-200 flex items-center gap-1">
                                        ⭐ {stickers.length} Stickers
                                    </div>
                                )}
                            </div>
                        </button>
                        <button onClick={startChallenge} className="group relative overflow-hidden bg-white p-8 rounded-3xl shadow-xl hover:shadow-2xl hover:scale-105 transition-all transform border-b-8 border-gray-200">
                            <div className="absolute top-0 right-0 w-24 h-24 bg-gray-200 rounded-bl-full opacity-20"></div>
                            <div className="flex flex-col items-center">
                                <span className="text-7xl mb-4">🛠️</span>
                                <span className="text-3xl font-bold text-gray-600">Parent Zone</span>
                                <span className="text-sm text-gray-400 mt-2 font-bold uppercase tracking-wider">Settings & Edit</span>
                            </div>
                        </button>
                    </div>
                    {!installed && installPrompt && (
                        <button onClick={handleInstall} className="mt-2 flex items-center gap-2 bg-white/80 backdrop-blur border border-gray-200 px-5 py-3 rounded-full shadow text-gray-700 font-bold text-sm hover:bg-white transition-all">
                            <span>📲</span> Install App
                        </button>
                    )}
                </div>
            );
        };

        const LibraryStats = ({ words }) => {
            const [audioCounts, setAudioCounts] = useState({ yoruba: 0, gungbe: 0 });

            useEffect(() => {
                getAllAudioEntries().then(entries => {
                    const keys = Object.keys(entries);
                    setAudioCounts({
                        yoruba: keys.filter(k => k.endsWith('_yoruba')).length,
                        gungbe: keys.filter(k => k.endsWith('_gungbe')).length,
                    });
                }).catch(() => {});
            }, [words]);

            const stats = [
                { label: 'Total Words', value: words.length, colour: 'blue', icon: '📚' },
                { label: 'Yoruba Audio', value: audioCounts.yoruba, colour: 'green', icon: '🎙️' },
                { label: 'Gungbe Audio', value: audioCounts.gungbe, colour: 'purple', icon: '🎙️' },
            ];

            return (
                <div className="bg-white rounded-2xl shadow-sm p-4 border border-gray-100">
                    <h2 className="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2">
                        <Icon name="BarChart" className="text-blue-500" /> Library
                    </h2>
                    <div className="grid grid-cols-3 gap-3">
                        {stats.map(({ label, value, colour, icon }) => (
                            <div key={label} className={'bg-' + colour + '-50 rounded-xl p-3 text-center border border-' + colour + '-100'}>
                                <div className="text-xl mb-1">{icon}</div>
                                <div className={'text-2xl font-black text-' + colour + '-600 mb-1'}>{value}</div>
                                <div className={'text-xs font-bold text-' + colour + '-800 opacity-70 leading-tight'}>{label}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const ParentManager = ({ words, setWords, playAudio, clearCache, theme, currentTheme, changeTheme, stats, settings, setSettings, localVersion, setLocalVersion }) => {
            const [view, setView] = useState('words');
            const [newWord, setNewWord] = useState({ english: '', yoruba: '', gungbe: '', category: 'Animals', icon: '❓' });
            
            // Inline editing state
            const [editingId, setEditingId] = useState(null);
            const [editForm, setEditForm] = useState(null);
            const [deleteConfirmationId, setDeleteConfirmationId] = useState(null);

            const [filter, setFilter] = useState('All');
            const [searchTerm, setSearchTerm] = useState('');
            const [exporting, setExporting] = useState(false);
            const fileInputRef = useRef(null);

            const categories = ['All', ...CATEGORIES];

            const handleAddWord = () => {
                if (!newWord.english) return;
                const id = Date.now().toString();
                setWords([{ ...newWord, id }, ...words]);
                setNewWord({ english: '', yoruba: '', gungbe: '', category: 'Animals', icon: '❓' });
            };

            const startEdit = (word) => { 
                setEditingId(word.id);
                setEditForm({ ...word });
                setDeleteConfirmationId(null);
            };

            const saveEdit = () => {
                setWords(words.map(w => w.id === editingId ? editForm : w));
                setEditingId(null);
                setEditForm(null);
            };

            const cancelEdit = () => {
                setEditingId(null);
                setEditForm(null);
            };

            const requestDelete = (id) => {
                setDeleteConfirmationId(id);
                setEditingId(null);
            };

            const confirmDelete = (id) => {
                setWords(words.filter(w => w.id !== id));
                setDeleteConfirmationId(null);
            };

            const cancelDelete = () => {
                setDeleteConfirmationId(null);
            };


            const handleBackup = async () => { 
                setExporting(true);
                try {
                    const audioEntries = await getAllAudioEntries();
                    const audioWithHashes = {};
                    for (const [key, blob] of Object.entries(audioEntries)) {
                        const base64 = await blobToBase64(blob);
                        const hash = await hashString(base64);
                        audioWithHashes[key] = { data: base64, hash };
                    }
                    const currentVersion = localStorage.getItem('ll_words_version') || '0.0.0';
                    const newVersion = incrementVersion(currentVersion);
                    localStorage.setItem('ll_words_version', newVersion);
                    setLocalVersion(newVersion);

                    // Also update stored hashes locally so next export is accurate
                    const hashes = {};
                    for (const [key, entry] of Object.entries(audioWithHashes)) hashes[key] = entry.hash;
                    localStorage.setItem('ll_audio_hashes', JSON.stringify(hashes));

                    // Download words.json
                    const backupData = { words, audio: audioWithHashes, version: newVersion, timestamp: new Date().toISOString() };
                    const blob = new Blob([JSON.stringify(backupData)], {type: 'application/json'});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = 'words.json'; a.click();

                    // Download version.json
                    const versionData = { version: newVersion, timestamp: new Date().toISOString() };
                    const vBlob = new Blob([JSON.stringify(versionData)], {type: 'application/json'});
                    const vUrl = URL.createObjectURL(vBlob);
                    const vA = document.createElement('a');
                    vA.href = vUrl; vA.download = 'version.json'; vA.click();
                } catch (e) { alert('Export failed: ' + e.message); }
                setExporting(false);
            };

            const handleRestore = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.words) {
                            setWords(data.words);
                            localStorage.setItem('littleLinguistWords_v3', JSON.stringify(data.words));
                        }
                        if (data.audio) {
                            const hashes = {};
                            for (const [key, entry] of Object.entries(data.audio)) {
                                // Support both old format (plain base64) and new format ({data, hash})
                                const base64 = typeof entry === 'string' ? entry : entry.data;
                                const hash = typeof entry === 'string' ? '' : (entry.hash || '');
                                const blob = await base64ToBlob(base64);
                                await saveAudioBlob(key, blob);
                                hashes[key] = hash;
                            }
                            localStorage.setItem('ll_audio_hashes', JSON.stringify(hashes));
                        }
                        if (data.version) {
                            localStorage.setItem('ll_words_version', data.version);
                            setLocalVersion(data.version);
                        }
                        alert('Backup restored!');
                    } catch (err) { alert('Error reading backup: ' + err.message); }
                };
                reader.readAsText(file);
            };

            const handleReset = async () => { 
                 if (confirm("⚠️ ARE YOU SURE? This will delete all words.")) {
                    localStorage.removeItem('littleLinguistWords_v3'); setWords(INITIAL_DATA);
                    try { const db = await initDB(); const t = db.transaction([STORE_NAME], 'readwrite'); t.objectStore(STORE_NAME).clear(); alert("Reset complete."); } catch(e) { console.error(e); }
                }
            };

            const filteredWords = words.filter(w => filter === 'All' ? true : w.category === filter).filter(w => w.english.toLowerCase().includes(searchTerm.toLowerCase()));

            return (
                <div className="max-w-4xl mx-auto p-4 space-y-4">
                    <div className="flex gap-2 mb-4 bg-white p-2 rounded-xl shadow-sm">
                        <button onClick={() => setView('words')} className={`flex-1 py-2 rounded-lg font-bold ${view === 'words' ? 'bg-blue-100 text-blue-700' : 'text-gray-500'}`}>Words</button>
                        <button onClick={() => setView('stats')} className={`flex-1 py-2 rounded-lg font-bold ${view === 'stats' ? 'bg-purple-100 text-purple-700' : 'text-gray-500'}`}>Stats</button>
                        <button onClick={() => setView('settings')} className={`flex-1 py-2 rounded-lg font-bold ${view === 'settings' ? 'bg-gray-100 text-gray-700' : 'text-gray-500'}`}>Settings</button>
                    </div>

                    {view === 'settings' && (
                        <div className="space-y-4 animate-pop">
                            <LibraryStats words={words} />
                            <div className="bg-white rounded-2xl shadow-sm p-4 border border-gray-100">
                                <h2 className="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2"><Icon name="Download" className="text-blue-500" /> Data</h2>
                                <div className="flex items-center justify-between mb-3 bg-gray-50 px-3 py-2 rounded-lg">
                                    <span className="text-sm font-bold text-gray-500">Data Pack Version</span>
                                    <span className="text-sm font-black text-blue-600">{localVersion === 'none' ? 'No pack installed' : 'v' + localVersion}</span>
                                </div>
                                <div className="grid grid-cols-3 gap-2">
                                    <button onClick={handleBackup} disabled={exporting} className="bg-blue-50 text-blue-600 p-2 rounded-lg border border-blue-100 font-bold hover:bg-blue-100 flex items-center justify-center gap-1 text-xs"><Icon name="FileJson" size={16}/> {exporting ? '...' : 'Backup'}</button>
                                    <div className="relative"><input type="file" ref={fileInputRef} onChange={handleRestore} accept=".json" className="hidden" /><button onClick={() => fileInputRef.current.click()} className="w-full h-full bg-green-50 text-green-600 p-2 rounded-lg border border-green-100 font-bold hover:bg-green-100 flex items-center justify-center gap-1 text-xs"><Icon name="Upload" size={16}/> Restore</button></div>
                                    <button onClick={handleReset} className="bg-red-50 text-red-600 p-2 rounded-lg border border-red-100 font-bold hover:bg-red-100 flex items-center justify-center gap-1 text-xs"><Icon name="RotateCcw" size={16}/> Reset</button>
                                </div>
                            </div>
                            <div className="bg-white rounded-2xl shadow-sm p-4 border border-gray-100">
                                <h2 className="text-lg font-bold text-gray-800 mb-2 flex items-center gap-2"><Icon name="Palette" className="text-purple-500" /> Theme</h2>
                                <div className="flex gap-2">
                                    {Object.values(THEMES).map(t => (
                                        <button key={t.id} onClick={() => changeTheme(t.id)} className={`flex-1 p-2 rounded-lg border-2 transition-all flex items-center justify-center gap-2 ${currentTheme === t.id ? `border-${t.primary.split('-')[1]}-500 bg-gray-50` : 'border-transparent bg-gray-100 hover:bg-gray-200'}`}>
                                            <span className="text-xl">{t.bgIcons[0]}</span><span className="font-bold text-gray-700 text-sm">{t.name}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-white rounded-2xl shadow-sm p-4 border border-gray-100">
                                <h2 className="text-lg font-bold text-gray-800 mb-2 flex items-center gap-2"><Icon name="Volume2" className="text-green-500" /> Preferences</h2>
                                <div className="space-y-4">
                                    <div className="flex items-center justify-between">
                                        <span className="text-gray-600">Auto-play audio</span>
                                        <button onClick={() => setSettings({...settings, autoPlayAudio: !settings.autoPlayAudio})} className={`w-12 h-6 rounded-full transition-colors relative ${settings.autoPlayAudio ? 'bg-green-500' : 'bg-gray-300'}`}>
                                            <div className={`absolute top-1 left-1 w-4 h-4 bg-white rounded-full transition-transform ${settings.autoPlayAudio ? 'translate-x-6' : ''}`}></div>
                                        </button>
                                    </div>
                                    <div className="flex items-center justify-between">
                                        <span className="text-gray-600">Flashcard Front</span>
                                        <div className="flex bg-gray-100 rounded-lg p-1">
                                            <button 
                                                onClick={() => setSettings({...settings, flashcardFront: 'english'})}
                                                className={`px-3 py-1 rounded-md text-xs font-bold transition-all ${settings.flashcardFront === 'english' ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-400'}`}
                                            >
                                                English
                                            </button>
                                            <button 
                                                onClick={() => setSettings({...settings, flashcardFront: 'native'})}
                                                className={`px-3 py-1 rounded-md text-xs font-bold transition-all ${settings.flashcardFront === 'native' ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-400'}`}
                                            >
                                                Native
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'stats' && (
                        <div className="space-y-4 animate-pop">
                            <div className="bg-white rounded-2xl shadow-sm p-6 border border-gray-100">
                                <div className="grid grid-cols-2 gap-4 mb-6">
                                    <div className="bg-green-50 p-4 rounded-2xl text-center"><div className="text-4xl font-bold text-green-600 mb-1">{stats.correct}</div><div className="text-sm font-bold text-green-800 opacity-60">Correct</div></div>
                                    <div className="bg-orange-50 p-4 rounded-2xl text-center"><div className="text-4xl font-bold text-orange-600 mb-1">{stats.incorrect}</div><div className="text-sm font-bold text-orange-800 opacity-60">Mistakes</div></div>
                                </div>
                                <h3 className="font-bold text-gray-600 mb-3">Top Categories</h3>
                                <div className="space-y-2">
                                    {Object.entries(stats.categories).sort((a,b) => b[1] - a[1]).slice(0, 5).map(([cat, count]) => (
                                        <div key={cat} className="flex justify-between items-center bg-gray-50 p-3 rounded-lg"><span className="font-medium text-gray-700">{cat}</span><span className="font-bold text-blue-600">{count} correct</span></div>
                                    ))}
                                    {Object.keys(stats.categories).length === 0 && (
                                        <div className="text-center text-gray-400 italic py-4">Play games to see stats!</div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'words' && (
                        <div className="bg-white rounded-2xl shadow-sm p-4 border border-gray-100 animate-pop">
                            <div id="edit-form" className="grid grid-cols-6 gap-2 mb-4 bg-gray-50 p-2 rounded-lg">
                                <input placeholder="Icon" value={newWord.icon} onChange={e => setNewWord({...newWord, icon: e.target.value})} className="p-2 rounded border w-full text-center" />
                                <input placeholder="English" value={newWord.english} onChange={e => setNewWord({...newWord, english: e.target.value})} className="p-2 rounded border w-full" />
                                <input placeholder="Yoruba" value={newWord.yoruba} onChange={e => setNewWord({...newWord, yoruba: e.target.value})} className="p-2 rounded border w-full" />
                                <input placeholder="Gungbe" value={newWord.gungbe} onChange={e => setNewWord({...newWord, gungbe: e.target.value})} className="p-2 rounded border w-full" />
                                <select value={newWord.category} onChange={e => setNewWord({...newWord, category: e.target.value})} className="p-2 rounded border w-full">{CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}</select>
                                <button onClick={handleAddWord} className="bg-green-500 text-white rounded font-bold p-2 hover:bg-green-600">Add</button>
                            </div>
                            <input type="text" placeholder="Search..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full p-2 border rounded-lg mb-2" />
                            <div className="flex gap-2 overflow-x-auto pb-2 mb-2 no-scrollbar">{categories.map(cat => <button key={cat} onClick={() => setFilter(cat)} className={`px-3 py-1 rounded-full text-xs font-bold ${filter === cat ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-600'}`}>{cat}</button>)}</div>
                            <div className="space-y-2">
                                {filteredWords.map(word => {
                                    const isEditing = editingId === word.id;
                                    const isDeleting = deleteConfirmationId === word.id;

                                    if (isEditing) {
                                        return (
                                            <div key={word.id} className="grid grid-cols-1 md:grid-cols-6 gap-2 bg-blue-50 p-2 rounded border-2 border-blue-200 shadow-sm items-center">
                                                <input value={editForm.icon} onChange={e => setEditForm({...editForm, icon: e.target.value})} className="p-2 rounded border text-center" placeholder="Icon" />
                                                <input value={editForm.english} onChange={e => setEditForm({...editForm, english: e.target.value})} className="p-2 rounded border" placeholder="English" />
                                                <input value={editForm.yoruba} onChange={e => setEditForm({...editForm, yoruba: e.target.value})} className="p-2 rounded border" placeholder="Yoruba" />
                                                <input value={editForm.gungbe} onChange={e => setEditForm({...editForm, gungbe: e.target.value})} className="p-2 rounded border" placeholder="Gungbe" />
                                                <select value={editForm.category} onChange={e => setEditForm({...editForm, category: e.target.value})} className="p-2 rounded border">{CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}</select>
                                                <div className="flex gap-1 justify-end">
                                                    <button onClick={saveEdit} className="bg-green-500 text-white p-2 rounded hover:bg-green-600"><Icon name="Save" size={16}/></button>
                                                    <button onClick={cancelEdit} className="bg-gray-400 text-white p-2 rounded hover:bg-gray-500"><Icon name="X" size={16}/></button>
                                                </div>
                                            </div>
                                        );
                                    }

                                    return (
                                        <div key={word.id} className="flex items-center justify-between bg-white p-2 rounded border shadow-sm">
                                            <div className="flex items-center gap-3 overflow-hidden">
                                                <span className="text-2xl min-w-[30px] text-center">{word.icon}</span>
                                                <div className="truncate">
                                                    <div className="font-bold truncate">{word.english}</div>
                                                    <div className="text-xs text-gray-500 truncate">{word.yoruba} • {word.gungbe}</div>
                                                </div>
                                            </div>
                                            <div className="flex gap-2 shrink-0">
                                                 {!isDeleting && (
                                                     <>
                                                        <VoiceRecorder wordId={word.id} lang="yoruba" textToSpeak={word.yoruba} playAudio={playAudio} onRecordComplete={() => clearCache(word.id, 'yoruba')} label="Y"/>
                                                        <VoiceRecorder wordId={word.id} lang="gungbe" textToSpeak={word.gungbe} playAudio={playAudio} onRecordComplete={() => clearCache(word.id, 'gungbe')} label="G"/>
                                                        <button onClick={() => startEdit(word)} className="text-blue-400 p-2 hover:bg-blue-50 rounded"><Icon name="Edit" size={16}/></button>
                                                        <button onClick={() => requestDelete(word.id)} className="text-red-400 p-2 hover:bg-red-50 rounded"><Icon name="Trash2" size={16}/></button>
                                                     </>
                                                 )}
                                                 {isDeleting && (
                                                     <div className="flex items-center gap-2 bg-red-50 px-2 rounded">
                                                         <span className="text-xs font-bold text-red-500">Delete?</span>
                                                         <button onClick={() => confirmDelete(word.id)} className="text-green-600 p-1 hover:bg-green-100 rounded"><Icon name="Check" size={16}/></button>
                                                         <button onClick={cancelDelete} className="text-gray-500 p-1 hover:bg-gray-200 rounded"><Icon name="X" size={16}/></button>
                                                     </div>
                                                 )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const VoiceRecorder = ({ wordId, lang, textToSpeak, playAudio, onRecordComplete, label }) => {
             const [isRecording, setIsRecording] = useState(false);
             const [hasRec, setHasRec] = useState(false);
             const mediaRecorder = useRef(null);

             useEffect(() => { getAudioBlob(`${wordId}_${lang}`).then(b => { if(b) setHasRec(true); }); }, [wordId, lang]);

             const toggleRec = async () => {
                 if (isRecording) { mediaRecorder.current.stop(); setIsRecording(false); } 
                 else {
                     try {
                         const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                         mediaRecorder.current = new MediaRecorder(stream);
                         const chunks = [];
                         mediaRecorder.current.ondataavailable = e => chunks.push(e.data);
                         mediaRecorder.current.onstop = async () => {
                             const blob = new Blob(chunks, { type: 'audio/webm' });
                             await saveAudioBlob(`${wordId}_${lang}`, blob); setHasRec(true); onRecordComplete();
                         };
                         mediaRecorder.current.start(); setIsRecording(true);
                     } catch(e) { alert("Mic Error"); }
                 }
             };

             return (
                 <div className="flex gap-1 items-center bg-gray-100 rounded-full px-2 py-1">
                     <span className="text-[10px] font-bold text-gray-500 w-2">{label}</span>
                     {hasRec && <button onClick={() => playAudio(wordId, lang)} className="text-blue-500 hover:text-blue-700"><Icon name="Play" size={14}/></button>}
                     {isRecording ? (
                         <div className="flex items-center gap-1 w-8 justify-center" onClick={toggleRec}>
                             <div className="w-1 bg-red-500 animate-wave" style={{animationDelay: '0s'}}></div>
                             <div className="w-1 bg-red-500 animate-wave" style={{animationDelay: '0.1s'}}></div>
                             <div className="w-1 bg-red-500 animate-wave" style={{animationDelay: '0.2s'}}></div>
                         </div>
                     ) : (
                         <div className="flex gap-1">
                             <button onClick={toggleRec} className="text-gray-400 hover:text-red-500"><Icon name="Mic" size={14}/></button>
                         </div>
                     )}
                 </div>
             );
        };

        const KidZone = ({ words, audioCache, playAudio, setMode, theme, stickers, setStickers, stats, updateStats, settings }) => {
            const [view, setView] = useState('lang_pick'); // lang_pick first
            const [category, setCategory] = useState(null);
            const [lang, setLang] = useState(null);
            const [audioKeys, setAudioKeys] = useState(new Set());

            useEffect(() => {
                getAllAudioEntries().then(entries => {
                    setAudioKeys(new Set(Object.keys(entries)));
                }).catch(() => {});
            }, [lang, words]);

            const wordsWithAudio = lang ? words.filter(w => audioKeys.has(w.id + '_' + lang)) : [];

            // --- Language Picker ---
            if (view === 'lang_pick') {
                return (
                    <div className="flex flex-col items-center justify-center min-h-[80vh] p-6 gap-8 animate-pop">
                        <div className="text-center">
                            <div className="text-7xl mb-4">👋</div>
                            <h1 className="text-3xl font-black text-gray-700 mb-2">What are we learning today?</h1>
                        </div>
                        <div className="flex flex-col gap-5 w-full max-w-xs">
                            <button
                                onClick={() => { setLang('gungbe'); setView('menu'); }}
                                className="w-full py-10 rounded-[2rem] text-white font-black text-3xl shadow-[0_8px_0_rgb(21,128,61)] active:shadow-none active:translate-y-2 transition-all flex flex-col items-center gap-2"
                                style={{background: 'linear-gradient(to bottom, #22c55e, #16a34a)'}}
                            >
                                <span className="text-5xl">🌿</span>
                                Gungbe
                            </button>
                            <button
                                onClick={() => { setLang('yoruba'); setView('menu'); }}
                                className="w-full py-10 rounded-[2rem] text-gray-800 font-black text-3xl shadow-[0_8px_0_rgb(161,98,7)] active:shadow-none active:translate-y-2 transition-all flex flex-col items-center gap-2"
                                style={{background: 'linear-gradient(to bottom, #fde047, #eab308)'}}
                            >
                                <span className="text-5xl">☀️</span>
                                Yoruba
                            </button>
                        </div>
                        <button onClick={() => setMode('landing')} className="text-gray-400 font-bold mt-4">← Back</button>
                    </div>
                );
            }

            // --- Main Menu ---
            if (view === 'menu') {
                return (
                    <div className="p-4 max-w-2xl mx-auto flex flex-col gap-6 animate-pop">
                        <div className="flex items-center justify-between mb-2">
                            <button onClick={() => setView('lang_pick')} className="bg-white/80 px-4 py-2 rounded-full font-bold text-gray-500 shadow text-sm">
                                {lang === 'gungbe' ? '🌿 Gungbe' : '☀️ Yoruba'} ↩
                            </button>
                            <button onClick={() => setView('stickers')} className="bg-white p-3 rounded-2xl shadow-lg flex flex-col items-center min-w-[70px]">
                                <span className="text-3xl">⭐</span>
                                <span className="text-xs font-bold text-gray-400">{stickers.length} Stickers</span>
                            </button>
                        </div>
                        <div className="grid grid-cols-1 gap-5">
                            <button onClick={() => setView('categories_learn')} className={`bg-white p-8 rounded-[2rem] shadow-xl hover:shadow-2xl hover:-translate-y-1 transition-all text-center border-b-8 ${theme.cardBorder}`}>
                                <span className="text-8xl block mb-4 drop-shadow-md">📚</span>
                                <span className={`text-3xl font-black ${theme.accentText}`}>Learn Words</span>
                            </button>
                            <button onClick={() => setView('categories_listen')} className="bg-white p-8 rounded-[2rem] shadow-xl hover:shadow-2xl hover:-translate-y-1 transition-all text-center border-b-8 border-purple-200">
                                <span className="text-8xl block mb-4 drop-shadow-md">👂</span>
                                <span className="text-3xl font-black text-purple-600">Listen & Repeat</span>
                            </button>
                            <button onClick={() => setView('categories_quiz')} className={`bg-white p-8 rounded-[2rem] shadow-xl hover:shadow-2xl hover:-translate-y-1 transition-all text-center border-b-8 ${theme.cardBorder}`}>
                                <span className="text-8xl block mb-4 drop-shadow-md">🎮</span>
                                <span className={`text-3xl font-black ${theme.accentText}`}>Play Game</span>
                            </button>
                        </div>
                        <button onClick={() => setMode('landing')} className="text-gray-400 font-bold mt-4 self-center">← Back to Home</button>
                    </div>
                );
            }

            if (view === 'stickers') return <StickerBook stickers={stickers} setView={setView} />;

            // --- Category Picker ---
            if (view.startsWith('categories')) {
                const mode = view.replace('categories_', '');
                const nextView = mode;
                return (
                    <div className="p-4 max-w-4xl mx-auto animate-pop">
                        <div className="flex items-center gap-4 mb-6">
                            <button onClick={() => setView('menu')} className="bg-white p-4 rounded-full shadow hover:bg-gray-50 text-gray-500 text-2xl">🏠</button>
                            <h2 className="text-3xl font-black text-gray-700">Pick a Topic!</h2>
                        </div>
                        {wordsWithAudio.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-16 text-center">
                                <div className="text-6xl mb-4">📭</div>
                                <p className="text-xl font-bold text-gray-500 mb-2">No words with audio yet</p>
                                <p className="text-gray-400 text-sm">Tap the update banner to download the latest word pack.</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-2 gap-5">
                                <button onClick={() => { setCategory('All'); setView(nextView); }} className={`col-span-2 ${theme.buttonClass} text-white p-8 rounded-3xl text-2xl font-black flex items-center justify-center gap-3`}>
                                    <span className="text-4xl">🌟</span> Mix Everything!
                                </button>
                                {[...new Set(wordsWithAudio.map(w => w.category))].map(cat => (
                                    <button key={cat} onClick={() => { setCategory(cat); setView(nextView); }} className={`bg-white p-6 rounded-3xl shadow-lg border-b-6 ${theme.cardBorder} hover:scale-105 transition-all`}>
                                        <div className="text-5xl mb-3">{wordsWithAudio.find(w => w.category === cat)?.icon}</div>
                                        <div className="font-black text-gray-600 text-lg">{cat}</div>
                                    </button>
                                ))}
                            </div>
                        )}
                    </div>
                );
            }

            const gameWords = category === 'All' ? wordsWithAudio : wordsWithAudio.filter(w => w.category === category);

            const noWordsMessage = (
                <div className="flex flex-col items-center justify-center min-h-[50vh] p-8 text-center animate-pop">
                    <div className="text-7xl mb-4">📭</div>
                    <h2 className="text-2xl font-black text-gray-600 mb-2">No words yet!</h2>
                    <p className="text-gray-400 font-medium mb-6">Check for updates or add audio in the Parent Zone.</p>
                    <button onClick={() => setView('menu')} className="bg-white px-8 py-4 rounded-2xl font-bold text-gray-500 shadow-lg text-xl">Go Back</button>
                </div>
            );

            if (view === 'learn') return gameWords.length === 0 ? noWordsMessage : <FlashCards words={gameWords} lang={lang} playAudio={playAudio} onBack={() => setView('categories_learn')} theme={theme} />;
            if (view === 'listen') return gameWords.length === 0 ? noWordsMessage : <ListenRepeat words={gameWords} lang={lang} playAudio={playAudio} onBack={() => setView('categories_listen')} theme={theme} />;
            if (view === 'quiz') return wordsWithAudio.length === 0 ? noWordsMessage : <QuizMode words={wordsWithAudio} category={category} lang={lang} playAudio={playAudio} onBack={() => setView('categories_quiz')} theme={theme} stats={stats} updateStats={updateStats} stickers={stickers} setStickers={setStickers} />;
            return null;
        };

        const StickerBook = ({ stickers, setView }) => (
            <div className="p-4 max-w-4xl mx-auto animate-pop">
                <div className="flex items-center gap-4 mb-6">
                        <button onClick={() => setView('menu')} className="bg-white p-3 rounded-full shadow hover:bg-gray-50 text-gray-500"><Icon name="Home"/></button>
                        <h2 className="text-2xl font-black text-gray-700">My Sticker Book</h2>
                </div>
                <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                    {STICKERS_DATA.map(s => {
                        const isUnlocked = stickers.includes(s.id);
                        return (
                            <div key={s.id} className={`p-4 rounded-2xl flex flex-col items-center text-center transition-all ${isUnlocked ? 'bg-white shadow-lg' : 'bg-gray-100 opacity-60'}`}>
                                <div className={`text-6xl mb-2 transition-transform ${isUnlocked ? 'scale-100' : 'scale-90 grayscale blur-sm'}`}>{s.icon}</div>
                                <div className="font-bold text-gray-800">{s.name}</div>
                                <div className="text-xs text-gray-500 mt-1">{s.desc}</div>
                                {isUnlocked ? <div className="mt-2 text-green-500 font-bold text-xs bg-green-50 px-2 py-1 rounded-full">Unlocked!</div> : <div className="mt-2 text-gray-400 font-bold text-xs bg-gray-200 px-2 py-1 rounded-full">Locked</div>}
                            </div>
                        );
                    })}
                </div>
            </div>
        );

        const FlashCards = ({ words, lang, playAudio, onBack, theme }) => {
            const [index, setIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [showStar, setShowStar] = useState(false);
            const autoAdvanceRef = useRef(null);

            const touchStartX = useRef(null);
            const touchEndX = useRef(null);
            const minSwipeDistance = 50;

            const word = words[index];
            // Native language is always the front
            const frontText = lang === 'yoruba' ? word.yoruba : word.gungbe;
            const backText = word.english;

            const playFront = () => playAudio(word.id, lang);
            const playBack = () => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(word.english);
                    window.speechSynthesis.speak(u);
                }
            };

            // Auto-play front audio on new card load, then auto-flip after 2.5s, then auto-advance after another 2.5s
            useEffect(() => {
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
                setIsFlipped(false);
                setShowStar(false);
                playAudio(word.id, lang);

                // Auto flip to show English after 2.5s
                const flipTimer = setTimeout(() => {
                    setIsFlipped(true);
                    playBack();
                    // Show star briefly
                    setShowStar(true);
                    setTimeout(() => setShowStar(false), 1000);
                }, 2500);

                // Auto advance after another 2.5s
                autoAdvanceRef.current = setTimeout(() => {
                    setIndex(i => (i + 1) % words.length);
                }, 5200);

                return () => {
                    clearTimeout(flipTimer);
                    clearTimeout(autoAdvanceRef.current);
                };
            }, [index]);

            const goNext = () => {
                clearTimeout(autoAdvanceRef.current);
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
                setIndex(i => (i + 1) % words.length);
            };
            const goPrev = () => {
                clearTimeout(autoAdvanceRef.current);
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
                setIndex(i => (i - 1 + words.length) % words.length);
            };

            // Tap card to replay current side audio
            const handleCardTap = () => {
                clearTimeout(autoAdvanceRef.current);
                if (isFlipped) { playBack(); } else { playFront(); }
            };

            const onTouchStart = (e) => { touchEndX.current = null; touchStartX.current = e.targetTouches[0].clientX; };
            const onTouchMove = (e) => { touchEndX.current = e.targetTouches[0].clientX; };
            const onTouchEnd = () => {
                if (!touchStartX.current || !touchEndX.current) return;
                const distance = touchStartX.current - touchEndX.current;
                if (distance > minSwipeDistance) goNext();
                else if (distance < -minSwipeDistance) goPrev();
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-[80vh] px-4 animate-pop touch-pan-y relative"
                    onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>

                    {showStar && <div className="absolute inset-0 flex items-center justify-center z-50 pointer-events-none text-[120px] animate-pop">⭐</div>}

                    <div className="w-full max-w-sm flex justify-between items-center mb-4">
                        <button onClick={onBack} className="bg-white/80 backdrop-blur p-3 rounded-full shadow text-gray-600 text-xl">🏠</button>
                        <span className="bg-white/80 backdrop-blur px-5 py-2 rounded-full font-black text-gray-600 shadow-sm text-lg">{index+1} / {words.length}</span>
                    </div>

                    <div className="relative w-full max-w-sm aspect-[3/4] cursor-pointer perspective-1000" onClick={handleCardTap}>
                        <div className={`relative w-full h-full duration-500 transform-style-3d transition-transform ${isFlipped ? 'rotate-y-180' : ''}`}>
                            {/* Front — native language */}
                            <div className={`absolute w-full h-full ${theme.primary} rounded-[2.5rem] shadow-2xl flex flex-col items-center justify-center p-8 border-b-[14px] border-black/20 backface-hidden`}>
                                <span className="text-[110px] mb-6 drop-shadow-lg leading-none">{word.icon}</span>
                                <h2 className="text-4xl font-black text-white text-center capitalize leading-tight">{frontText}</h2>
                                <div className="mt-6 opacity-70">
                                    <div className="bg-white/20 px-4 py-2 rounded-full text-white font-bold text-sm">👆 Tap to replay</div>
                                </div>
                            </div>
                            {/* Back — English */}
                            <div className={`absolute w-full h-full bg-white rounded-[2.5rem] shadow-2xl flex flex-col items-center justify-center p-8 border-b-[14px] ${theme.cardBorder} rotate-y-180 backface-hidden`}>
                                <span className="text-[110px] mb-6 drop-shadow-lg leading-none">{word.icon}</span>
                                <h2 className="text-4xl font-black text-gray-800 text-center capitalize leading-tight">{backText}</h2>
                                <div className="mt-6 opacity-70">
                                    <div className={`${theme.primary} px-4 py-2 rounded-full text-white font-bold text-sm`}>👆 Tap to replay</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="flex gap-4 mt-6 w-full max-w-sm">
                        <button onClick={goPrev} className="flex-1 bg-white py-5 rounded-2xl font-black text-gray-500 shadow-lg text-xl active:scale-95 transition-all">← Prev</button>
                        <button onClick={goNext} className={`flex-1 ${theme.buttonClass} py-5 rounded-2xl font-black text-white text-xl transition-all`}>Next →</button>
                    </div>
                </div>
            );
        };

        const ListenRepeat = ({ words, lang, playAudio, onBack, theme }) => {
            const [index, setIndex] = useState(0);
            const [played, setPlayed] = useState(false);
            const word = words[index];
            const nativeText = lang === 'yoruba' ? word.yoruba : word.gungbe;

            useEffect(() => {
                setPlayed(false);
                const t = setTimeout(() => {
                    playAudio(word.id, lang);
                    setPlayed(true);
                }, 400);
                return () => clearTimeout(t);
            }, [index]);

            const replay = () => { playAudio(word.id, lang); setPlayed(true); };
            const next = () => setIndex(i => (i + 1) % words.length);
            const prev = () => setIndex(i => (i - 1 + words.length) % words.length);

            return (
                <div className="flex flex-col items-center justify-center min-h-[80vh] px-4 animate-pop">
                    <div className="w-full max-w-sm flex justify-between items-center mb-6">
                        <button onClick={onBack} className="bg-white/80 p-3 rounded-full shadow text-xl">🏠</button>
                        <span className="bg-white/80 px-5 py-2 rounded-full font-black text-gray-600 shadow-sm text-lg">{index+1} / {words.length}</span>
                    </div>
                    <div className="w-full max-w-sm bg-white rounded-[2.5rem] shadow-2xl p-10 flex flex-col items-center border-b-[14px] border-purple-200">
                        <span className="text-[120px] mb-6 drop-shadow-lg leading-none">{word.icon}</span>
                        <h2 className="text-4xl font-black text-gray-800 text-center mb-2 capitalize">{nativeText}</h2>
                        <p className="text-gray-400 font-bold text-lg mb-8">"{word.english}"</p>
                        <button onClick={replay}
                            className="w-full py-6 rounded-2xl font-black text-white text-2xl shadow-[0_6px_0_rgb(88,28,135)] active:shadow-none active:translate-y-1 transition-all flex items-center justify-center gap-3"
                            style={{background: 'linear-gradient(to bottom, #a855f7, #7e22ce)'}}>
                            <span className="text-3xl">🔊</span> Hear it again!
                        </button>
                    </div>
                    <p className="text-gray-400 font-bold text-lg mt-6 text-center">Listen and say it out loud! 🗣️</p>
                    <div className="flex gap-4 mt-4 w-full max-w-sm">
                        <button onClick={prev} className="flex-1 bg-white py-5 rounded-2xl font-black text-gray-500 shadow-lg text-xl active:scale-95 transition-all">← Prev</button>
                        <button onClick={next} className="flex-1 py-5 rounded-2xl font-black text-white text-xl transition-all shadow-[0_6px_0_rgb(88,28,135)] active:shadow-none active:translate-y-1"
                            style={{background: 'linear-gradient(to bottom, #a855f7, #7e22ce)'}}>Next →</button>
                    </div>
                </div>
            );
        };

        const QuizMode = ({ words, category, lang, playAudio, onBack, theme, stats, updateStats, stickers, setStickers }) => {
             const [q, setQ] = useState(null);
             const [opts, setOpts] = useState([]);
             const [score, setScore] = useState(0);
             const [reward, setReward] = useState(false);
             const [unlockedSticker, setUnlockedSticker] = useState(null);
             const [wrongId, setWrongId] = useState(null);
             const [locked, setLocked] = useState(false);
             const pool = category === 'All' ? words : words.filter(w => w.category === category);

             const playWrongSound = () => {
                 try {
                     const ctx = new (window.AudioContext || window.webkitAudioContext)();
                     const osc = ctx.createOscillator();
                     const gain = ctx.createGain();
                     osc.connect(gain); gain.connect(ctx.destination);
                     osc.type = 'sawtooth';
                     osc.frequency.setValueAtTime(220, ctx.currentTime);
                     osc.frequency.exponentialRampToValueAtTime(110, ctx.currentTime + 0.3);
                     gain.gain.setValueAtTime(0.25, ctx.currentTime);
                     gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
                     osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.35);
                 } catch(e) {}
             };

             const playCorrectSound = () => {
                 try {
                     const ctx = new (window.AudioContext || window.webkitAudioContext)();
                     [523, 659, 784].forEach((freq, i) => {
                         const osc = ctx.createOscillator();
                         const gain = ctx.createGain();
                         osc.connect(gain); gain.connect(ctx.destination);
                         osc.type = 'sine';
                         osc.frequency.value = freq;
                         gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.12);
                         gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.3);
                         osc.start(ctx.currentTime + i * 0.12);
                         osc.stop(ctx.currentTime + i * 0.12 + 0.3);
                     });
                 } catch(e) {}
             };

             const gen = () => {
                 if (pool.length < 2) return;
                 const target = pool[Math.floor(Math.random() * pool.length)];
                 const others = pool.filter(w => w.id !== target.id).sort(() => 0.5 - Math.random()).slice(0, 1);
                 setQ(target);
                 setOpts([target, ...others].sort(() => 0.5 - Math.random()));
                 setWrongId(null);
                 setLocked(false);
                 setTimeout(() => playAudio(target.id, lang), 300);
             };

             useEffect(gen, []);

             const check = (sel) => {
                 if (locked) return;
                 const isCorrect = sel.id === q.id;
                 updateStats(isCorrect, q.category);
                 if (isCorrect) {
                     setLocked(true);
                     setScore(s => s + 1);
                     setReward(true);
                     playCorrectSound();
                     confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 }, colors: ['#FFD700', '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4'] });
                     const newStats = { ...stats, correct: stats.correct + 1, categories: { ...stats.categories, [q.category]: (stats.categories[q.category]||0) + 1 } };
                     const newUnlock = STICKERS_DATA.find(s => !stickers.includes(s.id) && s.criteria(newStats));
                     if (newUnlock) { setStickers([...stickers, newUnlock.id]); setUnlockedSticker(newUnlock); }
                     setTimeout(() => { setReward(false); setUnlockedSticker(null); gen(); }, 3000);
                 } else {
                     setWrongId(sel.id);
                     setLocked(true);
                     playWrongSound();
                     setTimeout(() => { setWrongId(null); setLocked(false); }, 800);
                 }
             };

             if (!q) return <div className="p-10 text-center font-bold text-2xl">Loading...</div>;

             return (
                 <div className="flex flex-col items-center min-h-[80vh] p-4 max-w-lg mx-auto animate-pop relative">
                     {/* Correct answer celebration */}
                     {reward && !unlockedSticker && (
                         <div className="absolute inset-0 flex flex-col items-center justify-center z-50 pointer-events-none">
                             <div className="text-[120px] animate-bounce drop-shadow-2xl">⭐</div>
                             <div className="text-5xl font-black text-yellow-500 mt-2 animate-pop">Well done!</div>
                         </div>
                     )}
                     {unlockedSticker && (
                         <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-white/95 backdrop-blur rounded-3xl animate-pop p-8 text-center">
                             <div className="text-[100px] mb-4 animate-bounce">{unlockedSticker.icon}</div>
                             <h3 className="text-3xl font-black text-yellow-500 mb-2">New Sticker!</h3>
                             <p className="text-2xl font-bold text-gray-700">{unlockedSticker.name}</p>
                         </div>
                     )}

                     <div className="w-full flex justify-between items-center mb-6">
                         <button onClick={onBack} className="bg-white p-3 rounded-full shadow text-2xl">🏠</button>
                         <div className="bg-white px-5 py-3 rounded-full font-black text-yellow-500 shadow-sm border-2 border-yellow-100 flex items-center gap-2 text-2xl">⭐ {score}</div>
                     </div>

                     <div className="text-center mb-6 w-full">
                         <h2 className="text-xl font-bold text-gray-500 mb-4 uppercase tracking-widest">Find the...</h2>
                         <button onClick={() => playAudio(q.id, lang)} className={`${theme.buttonClass} w-full py-10 rounded-3xl text-4xl font-black text-white flex items-center justify-center gap-4 active:scale-95 transition-all`}>
                             <span className="text-4xl">🔊</span>
                             <span className="capitalize">{q[lang] || q.english}</span>
                         </button>
                     </div>

                     <div className="grid grid-cols-2 gap-5 w-full">
                         {opts.map((o, i) => {
                             const isWrong = wrongId === o.id;
                             const base = 'aspect-square rounded-3xl border-4 transition-all flex flex-col items-center justify-center gap-2 p-4';
                             const idle = locked
                                 ? 'bg-white ' + theme.quizOptionBorder + ' opacity-50'
                                 : 'bg-white ' + theme.quizOptionBorder + ' active:scale-95 active:translate-y-1';
                             const cls = isWrong ? base + ' answer-wrong animate-shake' : base + ' ' + idle;
                             return (
                                 <button key={i} onClick={() => check(o)} className={cls}>
                                     <span className="text-7xl drop-shadow-sm">{o.icon}</span>
                                     <span className="font-black text-gray-600 text-base capitalize">{o.english}</span>
                                 </button>
                             );
                         })}
                     </div>
                 </div>
             );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
